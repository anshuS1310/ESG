services:
  # 1. Django Backend Web Service
  - type: web
    name: esg-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate --noinput && gunicorn esg_backend.wsgi:application --bind 0.0.0.0:$PORT"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: esg-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.12"

  # 2. Vite Frontend Static Site
  - type: web
    name: esg-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm run build"
    staticPublishPath: "dist"
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: esg-backend
          type: web
          property: host

databases:
  - name: esg-db
    plan: free
